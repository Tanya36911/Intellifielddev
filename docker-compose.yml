services:
  db:
    image: postgres:18
    container_name: intelli-db
    environment:
      POSTGRES_USER: intelli
      # Read from .env (never hardcoded). Compose fails with this message if unset.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      POSTGRES_DB: intelli
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelli -d intelli"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./api
    container_name: intelli-api
    environment:
      # Built from the .env password; username/host/db are not secret.
      DATABASE_URL: postgresql+psycopg://intelli:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/intelli
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (copy .env.example)}
      TZ: UTC
    volumes:
      # Live code + tests + migrations, so tests can run in-container and
      # code changes need only a restart, not a full rebuild.
      - ./api/app:/app/app
      - ./api/tests:/app/tests
      - ./db:/app/db:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Migrations (dbmate). Not started by `up` (profile "tools"); run on demand:
  #   docker compose run --rm migrate up
  migrate:
    image: ghcr.io/amacneil/dbmate:2
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgres://intelli:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/intelli?sslmode=disable
      TZ: UTC
    volumes:
      - ./db:/db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
