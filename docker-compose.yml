services:
  db:
    image: postgres:18
    container_name: intelli-db
    environment:
      POSTGRES_USER: intelli
      POSTGRES_PASSWORD: intelli_dev
      POSTGRES_DB: intelli
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelli -d intelli"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./api
    container_name: intelli-api
    environment:
      DATABASE_URL: postgresql+psycopg://intelli:intelli_dev@db:5432/intelli
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Migrations (dbmate). Not started by `up` (profile "tools"); run on demand:
  #   docker compose run --rm migrate up
  migrate:
    image: ghcr.io/amacneil/dbmate:2
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgres://intelli:intelli_dev@db:5432/intelli?sslmode=disable
    volumes:
      - ./db:/db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
